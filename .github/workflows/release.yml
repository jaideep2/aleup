name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Publishes @aleup/* to public npm. Requires the NPM_TOKEN repo secret
      # (npm automation token for the @aleup scope).
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `changeset version` bumps package.json versions (incl. internal semver ranges
          # like the example apps' "@aleup/import": "^0.1.x") but does NOT touch the lockfile.
          # Refresh it in the same step so the auto-generated "Version Packages" PR stays
          # installable — otherwise CI's `pnpm install --frozen-lockfile` rejects it.
          version: pnpm run version-packages
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
